name: Build and Push App

on:
  push:
    branches:
      - main
    paths:
      - 'litter-robot-proxy/**'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - amd64
          - aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Get version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' litter-robot-proxy/config.yaml | sed 's/version: *"//' | sed 's/"//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set platform
        id: platform
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "platform=linux/amd64" >> $GITHUB_OUTPUT
            echo "base=ghcr.io/home-assistant/amd64-base-python:3.11-alpine3.18" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.arch }}" = "aarch64" ]; then
            echo "platform=linux/arm64" >> $GITHUB_OUTPUT
            echo "base=ghcr.io/home-assistant/aarch64-base-python:3.11-alpine3.18" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6.9.0
        with:
          context: ./litter-robot-proxy
          platforms: ${{ steps.platform.outputs.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ steps.platform.outputs.base }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/litter-robot-proxy-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/litter-robot-proxy-${{ matrix.arch }}:latest
          labels: |
            io.hass.version=${{ steps.version.outputs.version }}
            io.hass.arch=${{ matrix.arch }}
            io.hass.type=addon
            io.hass.name=Litter Robot Proxy
