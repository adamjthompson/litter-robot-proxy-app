name: "Litter Robot Proxy"
description: "Local MQTT proxy for Litter Robot 3 Connect devices. Intercepts device communication and publishes real-time status to Home Assistant via MQTT Discovery."
version: "1.2.1"
slug: "litter_robot_proxy"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: "services"
boot: "auto"
ports:
  2000/udp: 2000
  2001/udp: 2001
ports_description:
  2000/udp: "Upstream server response port"
  2001/udp: "Robot communication port"
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  offline_threshold: 600
  robots: []
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: str
  offline_threshold: int
  robots:
    - name: str
      ip: str
      device_id: str?
      capacity: int?
map:
  - data:rw
logger: true